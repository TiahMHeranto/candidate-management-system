services:
  - type: web
    name: node-express-api
    env: docker
    plan: free
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false   # set manually in dashboard (secure)

      - key: JWT_SECRET
        sync: false

    healthCheckPath: /health
