services:
  - type: web
    name: candidate-api
    env: node
    plan: free
    autoDeploy: true

    rootDir: ./backend

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        sync: false

    healthCheckPath: /health