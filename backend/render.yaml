services:
  - type: web
    name: candidate-api
    env: docker
    plan: free
    autoDeploy: true

    dockerfilePath: ./backend/Dockerfile
    rootDir: ./backend

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        sync: false

    healthCheckPath: /health
